
<style>
  #root { position: relative; width: 100%; background: #000; border-radius: var(--border-radius-lg); overflow: hidden; min-height: 360px; }
  video { display: block; width: 100%; height: auto; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
  #result {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    color: #fff; font-size: 14px; line-height: 1.5;
    background: rgba(0,0,0,0.7); padding: 10px 14px;
    border-radius: 8px; pointer-events: none;
    border: 1px solid rgba(0,255,128,0.35);
  }
  #controls {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 6px; align-items: center;
  }
  #model-input {
    font-size: 12px; padding: 4px 8px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6);
    color: #fff; width: 130px;
  }
  #cam-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    padding: 10px 20px; font-size: 14px; cursor: pointer;
    background: rgba(255,255,255,0.1); color: #fff;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 8px;
  }
  #cam-btn:hover { background: rgba(255,255,255,0.2); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #00ff80; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
</style>

<div id="root">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <input id="model-input" type="text" value="llava" placeholder="model name" title="Ollama model" />
  </div>
  <div id="result">Draw a box over anything to identify it</div>
  <button id="cam-btn">Enable Camera</button>
</div>

<script>
(function() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const resultDiv = document.getElementById("result");
  const camBtn = document.getElementById("cam-btn");
  const modelInput = document.getElementById("model-input");

  const OLLAMA_URL = "http://localhost:11434/api/generate";

  let startX, startY, endX, endY;
  let drawing = false;
  let scanning = false;

  camBtn.addEventListener("click", startCamera);

  async function startCamera() {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = s;
      camBtn.style.display = "none";
      video.addEventListener("loadedmetadata", () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        loop();
      });
    } catch (err) {
      resultDiv.innerText = "Camera error: " + err.message;
    }
  }

  function getPos(e, isTouch) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = isTouch ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  }

  canvas.addEventListener("mousedown", e => { if (scanning) return; drawing = true; const p = getPos(e); startX = p.x; startY = p.y; endX = p.x; endY = p.y; });
  canvas.addEventListener("mousemove", e => { if (!drawing) return; const p = getPos(e); endX = p.x; endY = p.y; });
  canvas.addEventListener("mouseup", () => { if (!drawing) return; drawing = false; cropAndSend(); });
  canvas.addEventListener("touchstart", e => { e.preventDefault(); if (scanning) return; drawing = true; const p = getPos(e, true); startX = p.x; startY = p.y; endX = p.x; endY = p.y; }, { passive: false });
  canvas.addEventListener("touchmove", e => { e.preventDefault(); if (!drawing) return; const p = getPos(e, true); endX = p.x; endY = p.y; }, { passive: false });
  canvas.addEventListener("touchend", e => { e.preventDefault(); if (!drawing) return; drawing = false; cropAndSend(); }, { passive: false });

  function drawOverlay() {
    if (startX == null || endX == null) return;
    const x = Math.min(startX, endX), y = Math.min(startY, endY);
    const w = Math.abs(endX - startX), h = Math.abs(endY - startY);
    ctx.strokeStyle = "#00ff80";
    ctx.lineWidth = 2;
    ctx.setLineDash(drawing ? [6, 3] : []);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(0,255,128,0.07)";
    ctx.fillRect(x, y, w, h);
  }

  function loop() {
    if (video.readyState >= 2) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      drawOverlay();
    }
    requestAnimationFrame(loop);
  }

  function cropAndSend() {
    const x = Math.min(startX, endX), y = Math.min(startY, endY);
    const w = Math.abs(endX - startX), h = Math.abs(endY - startY);
    if (w < 20 || h < 20) { resultDiv.innerText = "Box too small — try again"; return; }
    const tmp = document.createElement("canvas");
    tmp.width = w; tmp.height = h;
    tmp.getContext("2d").drawImage(canvas, x, y, w, h, 0, 0, w, h);
    const base64 = tmp.toDataURL("image/jpeg", 0.85).split(",")[1];
    sendToOllama(base64);
  }

  async function sendToOllama(base64) {
    scanning = true;
    resultDiv.innerHTML = '<span class="spinner"></span>Scanning...';
    const model = modelInput.value.trim() || "llava";

    try {
      const res = await fetch(OLLAMA_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: model,
          prompt: "What is in this image? Be concise, 1-2 sentences.",
          images: [base64],
          stream: false
        })
      });

      if (!res.ok) {
        const txt = await res.text();
        resultDiv.innerText = "Ollama error " + res.status + ": " + txt.slice(0, 120);
        return;
      }

      const data = await res.json();
      resultDiv.innerText = data.response || "No response from model";
    } catch (err) {
      if (err.message.includes("fetch") || err.message.includes("Failed")) {
        resultDiv.innerText = "Cannot reach Ollama. Is it running? Try: ollama serve";
      } else {
        resultDiv.innerText = "Error: " + err.message;
      }
    } finally {
      scanning = false;
    }
  }
})();
</script>
